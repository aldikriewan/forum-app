name: CI/CD Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: forum-app/package-lock.json
      
      - name: Install dependencies
        working-directory: ./forum-app
        run: npm ci
      
      - name: Run linter
        working-directory: ./forum-app
        run: npm run lint
      
      - name: Run unit tests
        working-directory: ./forum-app
        run: npm test -- --watchAll=false --passWithNoTests

  build:
    runs-on: ubuntu-latest
    needs: test
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: forum-app/package-lock.json
      
      - name: Install dependencies
        working-directory: ./forum-app
        run: npm ci
      
      - name: Build application
        working-directory: ./forum-app
        run: npm run build